<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0c10;
      --panel: #111318;
      --border: #1f2330;
      --display-bg: #07090d;
      --accent: #00e5ff;
      --accent2: #ff4081;
      --op: #1a1f2e;
      --op-border: #2a3050;
      --num: #131720;
      --num-border: #1e2438;
      --text: #e8eaf6;
      --muted: #5c6480;
      --glow: 0 0 12px rgba(0,229,255,0.35);
      --glow2: 0 0 12px rgba(255,64,129,0.35);
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Rajdhani', sans-serif;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .calc-wrapper {
      position: relative;
      animation: fadeUp 0.6s cubic-bezier(.16,1,.3,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .calc-wrapper::before, .calc-wrapper::after {
      content: '';
      position: absolute;
      width: 20px; height: 20px;
      border-color: var(--accent);
      border-style: solid;
      opacity: 0.6;
    }
    .calc-wrapper::before { top: -6px; left: -6px; border-width: 2px 0 0 2px; }
    .calc-wrapper::after  { bottom: -6px; right: -6px; border-width: 0 2px 2px 0; }

    .calculator {
      width: 320px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 24px 20px 20px;
      position: relative;
      box-shadow:
        0 0 0 1px rgba(0,229,255,0.06),
        0 24px 60px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .calc-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 4px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .calc-label .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: var(--glow);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .display {
      background: var(--display-bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 16px 16px 12px;
      margin-bottom: 20px;
      min-height: 90px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: flex-end;
      position: relative;
      overflow: hidden;
    }
    .display::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(0,229,255,0.03) 0%, transparent 60%);
      pointer-events: none;
    }

    .expression {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      min-height: 16px;
      letter-spacing: 1px;
      transition: all 0.2s;
      word-break: break-all;
      text-align: right;
    }

    .result {
      font-family: 'Share Tech Mono', monospace;
      font-size: 36px;
      color: var(--text);
      line-height: 1.1;
      transition: all 0.15s;
      word-break: break-all;
      text-align: right;
    }
    .result.accent { color: var(--accent); text-shadow: var(--glow); }
    .result.error   { color: var(--accent2); font-size: 18px; }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    button {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 500;
      font-size: 16px;

      border-radius: 3px;
      background: var(--num);
      color: var(--text);
      cursor: pointer;
      transition: background 0.12s, color 0.12s, border-color 0.12s, box-shadow 0.12s, transform 0.08s;
      position: relative;
      overflow: hidden;
      user-select: none;
    }

    button:active { transform: scale(0.94); }

    button::after {
      content: '';
      position: absolute;
      inset: 0;
      background: white;
      opacity: 0;
      transition: opacity 0.2s;
    }
    button:active::after { opacity: 0.05; }

    button.op {
      background: var(--op);
      border-color: var(--op-border);
      color: var(--accent);
    }
    button.op:hover {
      background: rgba(0,229,255,0.08);
      border-color: var(--accent);
      box-shadow: var(--glow);
    }

    button.eq {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
      font-weight: 700;
      font-size: 20px;
    }
    button.eq:hover {
      background: #33eaff;
      box-shadow: var(--glow);
    }

    button.clear {
      color: var(--accent2);
      border-color: rgba(255,64,129,0.3);
    }
    button.clear:hover {
      background: rgba(255,64,129,0.08);
      border-color: var(--accent2);
      box-shadow: var(--glow2);
    }

    button.wide { grid-column: span 2; }

    button:not(.op):not(.eq):not(.clear):hover {
      background: #1c2133;
      border-color: #2a3050;
    }

    .hint {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      color: var(--muted);
      text-align: center;
      margin-top: 16px;
      letter-spacing: 2px;
      opacity: 0.6;
    }
  </style>
</head>
<body>

<div class="calc-wrapper">
  <div class="calculator">
    <div class="calc-label">
      <span>CALC-01</span>
      <div class="dot"></div>
    </div>

    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>

    <div class="buttons">
      <button class="clear"   onclick="clearAll()">AC</button>
      <button class="op"      onclick="toggleSign()">+/−</button>
      <button class="op"      onclick="percent()">%</button>
      <button class="op"      onclick="inputOp('/')">÷</button>

      <button onclick="inputNum('7')">7</button>
      <button onclick="inputNum('8')">8</button>
      <button onclick="inputNum('9')">9</button>
      <button class="op" onclick="inputOp('*')">×</button>

      <button onclick="inputNum('4')">4</button>
      <button onclick="inputNum('5')">5</button>
      <button onclick="inputNum('6')">6</button>
      <button class="op" onclick="inputOp('-')">−</button>

      <button onclick="inputNum('1')">1</button>
      <button onclick="inputNum('2')">2</button>
      <button onclick="inputNum('3')">3</button>
      <button class="op" onclick="inputOp('+')">+</button>

      <button class="wide" onclick="inputNum('0')">0</button>
      <button onclick="inputDot()">.</button>
      <button class="eq" onclick="calculate()">=</button>
    </div>

    <div class="hint">KEYBOARD SUPPORTED</div>
  </div>
</div>

<script>
  let current = '0';
  let expression = '';
  let justCalc = false;

  const resultEl = document.getElementById('result');
  const exprEl   = document.getElementById('expression');

  function updateDisplay() {
    resultEl.textContent = current;
    resultEl.className = 'result';
    exprEl.textContent = expression;
  }

  function inputNum(n) {
    if (justCalc) { current = n; expression = ''; justCalc = false; }
    else if (current === '0' || current === 'Error') current = n;
    else current += n;
    updateDisplay();
  }

  function inputDot() {
    if (justCalc) { current = '0.'; expression = ''; justCalc = false; }
    else if (!current.includes('.')) current += '.';
    updateDisplay();
  }

  function inputOp(op) {
    justCalc = false;
    if (expression && /[+\-*/]$/.test(expression)) {
      expression = expression.slice(0, -1) + op;
    } else {
      expression += current + op;
      current = '0';
    }
    updateDisplay();
  }

  function calculate() {
    if (!expression) return;
    const full = expression + current;
    exprEl.textContent = full + '=';
    try {
      let res = Function('"use strict"; return (' + full + ')')();
      if (!isFinite(res)) throw new Error();
      res = parseFloat(res.toPrecision(12));
      current = String(res);
      expression = '';
      justCalc = true;
      resultEl.textContent = current;
      resultEl.className = 'result accent';
    } catch {
      current = 'Error';
      expression = '';
      justCalc = true;
      resultEl.textContent = 'Error';
      resultEl.className = 'result error';
    }
  }

  function clearAll() {
    current = '0'; expression = ''; justCalc = false;
    updateDisplay();
  }

  function toggleSign() {
    if (current !== '0' && current !== 'Error')
      current = String(parseFloat(current) * -1);
    updateDisplay();
  }

  function percent() {
    if (current !== 'Error')
      current = String(parseFloat(current) / 100);
    updateDisplay();
  }

  document.addEventListener('keydown', e => {
    if (e.key >= '0' && e.key <= '9') inputNum(e.key);
    else if (e.key === '.') inputDot();
    else if (e.key === '+') inputOp('+');
    else if (e.key === '-') inputOp('-');
    else if (e.key === '*') inputOp('*');
    else if (e.key === '/') { e.preventDefault(); inputOp('/'); }
    else if (e.key === 'Enter' || e.key === '=') calculate();
    else if (e.key === 'Backspace') {
      if (current.length > 1) current = current.slice(0, -1);
      else current = '0';
      updateDisplay();
    }
    else if (e.key === 'Escape') clearAll();
    else if (e.key === '%') percent();
  });
</script>
</body>
</html>
